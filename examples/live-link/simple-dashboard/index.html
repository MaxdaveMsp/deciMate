<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DeciMate SPL Live Link Simple Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: ui-rounded, "SF Pro Rounded", Inter, system-ui, sans-serif;
      background: #0d111b;
      color: #f5f7fb;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, rgba(51, 209, 250, 0.14), transparent 34rem),
        #0d111b;
    }

    main {
      width: min(920px, calc(100vw - 32px));
      display: grid;
      gap: 16px;
    }

    header,
    section {
      background: #171d2b;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 18px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(26px, 4vw, 42px);
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: rgba(245, 247, 251, 0.68);
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    input,
    button {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      background: #0d111b;
      color: #f5f7fb;
      font: inherit;
      padding: 10px 12px;
    }

    input {
      flex: 1 1 280px;
      min-width: 0;
    }

    button {
      cursor: pointer;
      background: #33d1fa;
      color: #071019;
      font-weight: 800;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    .metric {
      min-height: 130px;
      display: grid;
      align-content: center;
      gap: 8px;
    }

    .label {
      color: rgba(245, 247, 251, 0.58);
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
    }

    .value {
      font-size: clamp(36px, 7vw, 72px);
      font-weight: 950;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .state {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .badge {
      border-radius: 999px;
      padding: 8px 12px;
      background: rgba(74, 222, 128, 0.14);
      color: #4ade80;
      font-weight: 900;
    }

    .badge.warning { background: rgba(250, 204, 21, 0.14); color: #facc15; }
    .badge.critical { background: rgba(251, 146, 60, 0.14); color: #fb923c; }
    .badge.peak { background: rgba(248, 113, 113, 0.14); color: #f87171; }

    @media (max-width: 680px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>DeciMate SPL Live Link</h1>
      <p>Simple local dashboard polling the iPhone JSON endpoint.</p>
      <div class="controls">
        <input id="endpoint" value="http://iphone.local:8080/status" aria-label="Live Link endpoint">
        <button id="connect">Connect</button>
        <button id="mock">Mock</button>
      </div>
    </header>

    <section class="grid">
      <div class="metric">
        <div class="label">Current</div>
        <div class="value"><span id="current">--.-</span></div>
        <p>dB SPL</p>
      </div>
      <div class="metric">
        <div class="label">Average</div>
        <div class="value"><span id="average">--.-</span></div>
        <p>dB SPL</p>
      </div>
      <div class="metric">
        <div class="label">Peak</div>
        <div class="value"><span id="peak">--.-</span></div>
        <p>dB SPL</p>
      </div>
      <div class="metric">
        <div class="label">Leq 1m</div>
        <div class="value"><span id="leq1">--.-</span></div>
        <p>dB SPL</p>
      </div>
      <div class="metric">
        <div class="label">Leq 10m</div>
        <div class="value"><span id="leq10">--.-</span></div>
        <p>dB SPL</p>
      </div>
    </section>

    <section class="state">
      <div>
        <div class="label">Status</div>
        <p id="status">Waiting to connect</p>
      </div>
      <div id="badge" class="badge">SAFE</div>
    </section>
  </main>

  <script>
    const ui = {
      endpoint: document.querySelector("#endpoint"),
      connect: document.querySelector("#connect"),
      mock: document.querySelector("#mock"),
      current: document.querySelector("#current"),
      average: document.querySelector("#average"),
      peak: document.querySelector("#peak"),
      leq1: document.querySelector("#leq1"),
      leq10: document.querySelector("#leq10"),
      status: document.querySelector("#status"),
      badge: document.querySelector("#badge")
    };

    let timer;
    let mockPhase = 0;

    function format(value) {
      return Number.isFinite(value) ? value.toFixed(1) : "--.-";
    }

    function render(snapshot) {
      const state = snapshot.threshold_state || "safe";
      ui.current.textContent = format(snapshot.spl_current);
      ui.average.textContent = format(snapshot.spl_average);
      ui.peak.textContent = format(snapshot.spl_peak);
      ui.leq1.textContent = format(snapshot.leq_1_minute);
      ui.leq10.textContent = format(snapshot.leq_10_minutes);
      ui.status.textContent = `${snapshot.measurement_mode || "Live"} · ${snapshot.companion_state || "Live"} · ${snapshot.timestamp || "now"}`;
      ui.badge.className = `badge ${state}`;
      ui.badge.textContent = state.toUpperCase();
    }

    async function poll() {
      try {
        const response = await fetch(ui.endpoint.value, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        render(await response.json());
      } catch (error) {
        ui.status.textContent = `Connection failed: ${error.message}`;
      }
    }

    function mockSnapshot() {
      mockPhase += 0.25;
      const spl = 82 + Math.sin(mockPhase) * 12 + Math.sin(mockPhase * 0.31) * 6;
      const state = spl > 108 ? "peak" : spl > 100 ? "critical" : spl > 90 ? "warning" : "safe";
      const messages = { safe: "All good!", warning: "Getting loud...", critical: "Too loud!", peak: "PEAK! Oww!!" };
      return {
        app: "DeciMate SPL",
        timestamp: new Date().toISOString(),
        spl_current: spl,
        spl_average: spl - 2.6,
        spl_peak: Math.max(96, spl + 4.5),
        spl_leq: spl - 1.4,
        leq_1_minute: spl - 0.8,
        leq_10_minutes: spl - 2.1,
        measurement_mode: "SPL A Fast",
        threshold_state: state,
        companion_state: messages[state]
      };
    }

    ui.connect.addEventListener("click", () => {
      clearInterval(timer);
      poll();
      timer = setInterval(poll, 1000);
    });

    ui.mock.addEventListener("click", () => {
      clearInterval(timer);
      render(mockSnapshot());
      timer = setInterval(() => render(mockSnapshot()), 700);
    });
  </script>
</body>
</html>
