name: deciMate
options:
  bundleIdPrefix: com.loudandbeyond
  deploymentTarget:
    iOS: '17.0'
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: '5.0'
    MARKETING_VERSION: '1.0'
    CURRENT_PROJECT_VERSION: '2'
targets:
  deciMate:
    type: application
    platform: iOS
    sources:
      - deciMate
    resources:
      - deciMate/Assets.xcassets
      - deciMate/LaunchScreen.storyboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loudandbeyond.decimate
        INFOPLIST_FILE: deciMate/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: '1,2'
  deciMateTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - deciMateTests
    dependencies:
      - target: deciMate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loudandbeyond.decimate.tests
